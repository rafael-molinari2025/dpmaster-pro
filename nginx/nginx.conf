# ============================================================
# DPMaster Pro — Nginx Reverse Proxy
# Proxy para Streamlit com HTTPS, WebSocket e segurança
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Compressão
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Rate limiting (proteção contra abuso)
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Upstream: Streamlit App ────────────────────────────
    upstream dpmaster_app {
        server dpmaster:8501;
    }

    # ── HTTP → HTTPS Redirect ─────────────────────────────
    server {
        listen 80;
        server_name dpmasterpro.com.br www.dpmasterpro.com.br;

        # Certbot challenge (necessário para renovação SSL)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirecionar tudo para HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server (Principal) ──────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name dpmasterpro.com.br www.dpmasterpro.com.br;

        # Certificados SSL (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/dpmasterpro.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dpmasterpro.com.br/privkey.pem;

        # Configurações SSL modernas
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Headers de segurança
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Rate limiting na raiz
        limit_req zone=login burst=10 nodelay;
        limit_conn addr 20;

        # ── Proxy para Streamlit ──────────────────────────
        location / {
            proxy_pass http://dpmaster_app;
            proxy_http_version 1.1;

            # Headers essenciais para proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket (obrigatório para Streamlit)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts generosos para operações pesadas
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 60s;

            # Buffer settings
            proxy_buffering off;
            proxy_buffer_size 16k;
            proxy_busy_buffers_size 24k;
            proxy_buffers 64 4k;
        }

        # ── WebSocket explícito para Streamlit ────────────
        location /_stcore/stream {
            proxy_pass http://dpmaster_app/_stcore/stream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # ── Health check interno ──────────────────────────
        location /_stcore/health {
            proxy_pass http://dpmaster_app/_stcore/health;
            access_log off;
        }

        # Bloquear acesso a arquivos sensíveis
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
